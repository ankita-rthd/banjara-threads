<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="t1"><title id="t1">Shisha mirror work — cluster of embroidered mirror circles</title>
  <defs>
    <radialGradient id="mBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a2c2a"/>
      <stop offset="100%" stop-color="#1e2d4a"/>
    </radialGradient>
    <radialGradient id="mShisha" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f4c573"/>
      <stop offset="100%" stop-color="#c84b31"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#mBg)"/>
  <!-- Big central mirror -->
  <g transform="translate(200 150)">
    <!-- Petal ring -->
    <g fill="#1f6e5d">
      <path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/>
      <g transform="rotate(45)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
      <g transform="rotate(90)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
      <g transform="rotate(135)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
      <g transform="rotate(180)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
      <g transform="rotate(225)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
      <g transform="rotate(270)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
      <g transform="rotate(315)"><path d="M0 -72 Q 14 -54 0 -48 Q -14 -54 0 -72Z"/></g>
    </g>
    <circle r="42" fill="url(#mShisha)" stroke="#e8a33d" stroke-width="2"/>
    <circle r="42" fill="none" stroke="#fff8e7" stroke-width="1" opacity="0.6"/>
    <circle r="32" fill="none" stroke="#1e2d4a" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.45"/>
  </g>
  <!-- Satellite mirrors -->
  <g>
    <circle cx="78" cy="78" r="20" fill="url(#mShisha)" stroke="#e8a33d" stroke-width="1.5"/>
    <circle cx="322" cy="78" r="20" fill="url(#mShisha)" stroke="#e8a33d" stroke-width="1.5"/>
    <circle cx="78" cy="222" r="20" fill="url(#mShisha)" stroke="#e8a33d" stroke-width="1.5"/>
    <circle cx="322" cy="222" r="20" fill="url(#mShisha)" stroke="#e8a33d" stroke-width="1.5"/>
  </g>
  <!-- Running stitch arcs -->
  <g stroke="#e8a33d" stroke-width="1.2" fill="none" stroke-dasharray="4 4" opacity="0.6">
    <path d="M78 78 Q 140 40 200 78"/>
    <path d="M200 78 Q 260 40 322 78"/>
    <path d="M78 222 Q 140 260 200 222"/>
    <path d="M200 222 Q 260 260 322 222"/>
  </g>
</svg>

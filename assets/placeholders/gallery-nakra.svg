<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="t3"><title id="t3">Nakra diamond — small diamonds formed by four straight lines</title>
  <defs>
    <linearGradient id="nBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c84b31"/>
      <stop offset="100%" stop-color="#7a1f0f"/>
    </linearGradient>
    <pattern id="nDia" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <g fill="#e8a33d" stroke="#fff8e7" stroke-width="1">
        <polygon points="22,8 36,22 22,36 8,22"/>
      </g>
      <g fill="#1e2d4a">
        <circle cx="22" cy="22" r="3"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#nBg)"/>
  <rect x="20" y="20" width="360" height="260" fill="url(#nDia)"/>
  <!-- Border stitches -->
  <g fill="none" stroke="#fff8e7" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.8">
    <rect x="20" y="20" width="360" height="260"/>
  </g>
</svg>

  <!-- Hair edge -->
  <path d="M75 78 Q 100 60 125 78" fill="#2a1a18"/>
  <!-- Features -->
  <g fill="#1e2d4a"><ellipse cx="90" cy="92" rx="2.5" ry="1.8"/><ellipse cx="110" cy="92" rx="2.5" ry="1.8"/></g>
  <circle cx="100" cy="80" r="2.4" fill="#c84b31"/>
  <circle cx="97" cy="103" r="2.8" fill="none" stroke="#e8a33d" stroke-width="1.2"/>
  <path d="M94 110 Q 100 114 106 110" stroke="#8a2c1a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Earrings -->

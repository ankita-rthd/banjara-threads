<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Illustrative portrait of a Banjara artisan in a saffron odhni">
  <defs>
    <radialGradient id="a1Bg" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#2a3f5f"/><stop offset="100%" stop-color="#13213a"/></radialGradient>
    <radialGradient id="a1Mir" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#fff8e7"/><stop offset="60%" stop-color="#f4c573"/><stop offset="100%" stop-color="#c84b31"/></radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#a1Bg)"/>
  <!-- Shoulders -->
  <path d="M20 200 Q 50 130 100 130 Q 150 130 180 200 Z" fill="#1f6e5d"/>

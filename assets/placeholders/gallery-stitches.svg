<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="t9"><title id="t9">A sampler of traditional Banjara stitches</title>
  <defs>
    <linearGradient id="sBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe1c2"/>
      <stop offset="100%" stop-color="#c8b88f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sBg)"/>

  <!-- Chain stitch row -->

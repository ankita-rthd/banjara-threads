      <line x1="132" y1="95" x2="132" y2="115"/><line x1="140" y1="95" x2="140" y2="115"/>
      <line x1="148" y1="95" x2="148" y2="115"/><line x1="156" y1="95" x2="156" y2="115"/>
      <line x1="164" y1="95" x2="164" y2="115"/><line x1="172" y1="95" x2="172" y2="115"/>
      <line x1="180" y1="95" x2="180" y2="115"/><line x1="188" y1="95" x2="188" y2="115"/>
      <line x1="196" y1="95" x2="196" y2="115"/><line x1="204" y1="95" x2="204" y2="115"/>
      <line x1="212" y1="95" x2="212" y2="115"/><line x1="220" y1="95" x2="220" y2="115"/>
      <line x1="228" y1="95" x2="228" y2="115"/><line x1="236" y1="95" x2="236" y2="115"/>
      <line x1="244" y1="95" x2="244" y2="115"/><line x1="252" y1="95" x2="252" y2="115"/>
      <line x1="260" y1="95" x2="260" y2="115"/><line x1="268" y1="95" x2="268" y2="115"/>

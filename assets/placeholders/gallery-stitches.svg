  <!-- Herringbone row -->
  <g stroke="#8b5a2b" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M20 160 L 40 140 L 60 160 L 80 140 L 100 160 L 120 140 L 140 160 L 160 140 L 180 160 L 200 140 L 220 160 L 240 140 L 260 160 L 280 140 L 300 160 L 320 140 L 340 160 L 360 140 L 380 160"/>
